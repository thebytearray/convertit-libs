name: Publish to GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Maven version to publish (e.g. 1.0.0 or 1.0.0-SNAPSHOT)
        required: true
        default: "1.0.0-SNAPSHOT"
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake (match jitpack.yml)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "ndk;29.0.13113456" "cmake;3.22.1" "platforms;android-36" "build-tools;36.1.0"

      - name: Resolve publish version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            RAW="${{ github.event.release.tag_name }}"
            VERSION="${RAW#v}"
          else
            RAW="${GITHUB_REF_NAME}"
            VERSION="${RAW#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish native libraries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew publishAllNativeLibrariesToGitHubPackages \
            -PpublishVersion="${{ steps.version.outputs.version }}" \
            --no-daemon \
            -x test
